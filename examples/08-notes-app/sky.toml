name = "notes-app"
version = "0.1.0"
entry = "src/Main.sky"
port = 8000

[source]
root = "src"

[database]
driver = "sqlite"
path = "skynotes.db"

[auth]
method = "password"
secret = "notes-app-dev-secret-change-in-prod"
session_ttl = "24h"
email_verification = true

["go.dependencies"]
"net/http" = "latest"
"github.com/gorilla/mux" = "latest"
"crypto/sha256" = "latest"
"encoding/hex" = "latest"
"github.com/google/uuid" = "latest"
"io" = "latest"
"os" = "latest"
