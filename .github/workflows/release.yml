name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build the compiler from committed Go source (no external dependency)
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Install goimports (needed by DCE to clean unused imports)
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      # Build skyi-filter tool first (needed for large .skyi filtering)
      - name: Build tools
        run: |
          go build -o /usr/local/bin/skyi-filter tools/skyi_filter.go
          go build -o /usr/local/bin/trim-imports tools/trim_imports.go

      # Bootstrap from committed Go source (sky-out/main.go)
      - name: Bootstrap compiler from Go source
        run: |
          cd sky-out
          go build -gcflags=all=-l -o app .
          cd ..
          cp -f sky-out/app /usr/local/bin/sky
          sky build src/Main.sky
          sky-out/app version

      # Phase 2: self-host (new compiler compiles itself)
      - name: Phase 2 self-host
        run: |
          cp -f sky-out/app /usr/local/bin/sky
          rm -rf sky-out
          sky build src/Main.sky
          sky-out/app version

      # Phase 3: propagate lowerer fixes
      - name: Phase 3 bootstrap
        run: |
          cp -f sky-out/app /usr/local/bin/sky
          rm -rf sky-out
          sky build src/Main.sky
          sky-out/app version

      # Verify the built compiler works (not a hello-world binary)
      - name: Verify compiler
        run: |
          sky-out/app check src/Main.sky
          echo "Compiler verification passed"

      # Upload the bootstrapped Go source for cross-compilation
      - name: Upload Go source
        uses: actions/upload-artifact@v4
        with:
          name: sky-go-source
          path: |
            sky-out/main.go
            sky-out/go.mod
            sky-out/sky_parallel.go

  # Cross-compile for all platforms
  build:
    needs: bootstrap
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: sky-linux-x64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            artifact: sky-linux-arm64
          - os: macos-15
            goos: darwin
            goarch: amd64
            artifact: sky-darwin-x64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: sky-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: sky-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download Go source
        uses: actions/download-artifact@v4
        with:
          name: sky-go-source
          path: sky-out

      - name: Build binary
        run: |
          cd sky-out
          VERSION="${GITHUB_REF_NAME}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w -X main.skyVersion=${VERSION}" -o ../${{ matrix.artifact }} .
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            [[ "$dir" == *"sky-go-source"* ]] && continue
            cp "$dir"* release/ 2>/dev/null || true
          done
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  docker:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            anzel/sky:latest
            anzel/sky:${{ steps.version.outputs.VERSION }}
          platforms: linux/amd64,linux/arm64
