name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact: sky-linux-x64
            lsp_artifact: sky-lsp-linux-x64
          - os: ubuntu-24.04-arm
            target: node18-linux-arm64
            artifact: sky-linux-arm64
            lsp_artifact: sky-lsp-linux-arm64
          - os: macos-15
            target: node18-macos-x64
            artifact: sky-darwin-x64
            lsp_artifact: sky-lsp-darwin-x64
          - os: macos-latest
            target: node18-macos-arm64
            artifact: sky-darwin-arm64
            lsp_artifact: sky-lsp-darwin-arm64
          - os: windows-latest
            target: node18-win-x64
            artifact: sky-windows-x64.exe
            lsp_artifact: sky-lsp-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build and package
        run: node src/bin/build-binary.js
        env:
          SKY_BUILD_TARGET: ${{ matrix.target }}
          SKY_BUILD_OUTPUT: dist/${{ matrix.artifact }}
          SKY_LSP_BUILD_OUTPUT: dist/${{ matrix.lsp_artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.lsp_artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            for file in "$dir"dist/*; do
              cp "$file" release/
            done
          done
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  docker:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            anzel/sky:latest
            anzel/sky:${{ steps.version.outputs.VERSION }}
          platforms: linux/amd64,linux/arm64
