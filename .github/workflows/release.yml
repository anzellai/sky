name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # First: bootstrap the self-hosted compiler on a native runner
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts-compiler/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # Phase 0: TS bootstrap
      - name: Bootstrap Phase 0 — TS compiler
        run: |
          cd ts-compiler
          npm ci
          npx tsx bin/sky.ts build ../src/Main.sky || true
          sed -i 's/return func() any {  }()/return true/g' dist/Ffi/BindingGen/BindingGen.go dist/Ffi/WrapperGen/WrapperGen.go 2>/dev/null || true
          cd dist && go build -gcflags=all=-l -o sky-bootstrap .

      # Phase 1 + 2: Self-hosted bootstrap
      - name: Bootstrap Phase 1+2 — self-hosted
        run: |
          cp ts-compiler/dist/sky-bootstrap bin/sky
          chmod +x bin/sky
          export PATH="$PWD/bin:$PATH"

          # Phase 1
          rm -rf sky-out
          sky build src/Main.sky
          cp sky-out/app bin/sky

          # Phase 2 (verify self-hosting)
          rm -rf sky-out
          sky build src/Main.sky

      # Upload the bootstrapped Go source for cross-compilation
      - name: Upload Go source
        uses: actions/upload-artifact@v4
        with:
          name: sky-go-source
          path: |
            sky-out/main.go
            sky-out/go.mod

  # Then: cross-compile for all platforms from the bootstrapped Go source
  build:
    needs: bootstrap
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: sky-linux-x64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            artifact: sky-linux-arm64
          - os: macos-15
            goos: darwin
            goarch: amd64
            artifact: sky-darwin-x64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: sky-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: sky-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download Go source
        uses: actions/download-artifact@v4
        with:
          name: sky-go-source
          path: sky-out

      - name: Build binary
        run: |
          cd sky-out
          VERSION="${GITHUB_REF_NAME}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w -X main.skyVersion=${VERSION}" -o ../${{ matrix.artifact }} main.go
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            # Skip the go-source artifact
            [[ "$dir" == *"sky-go-source"* ]] && continue
            cp "$dir"* release/ 2>/dev/null || true
          done
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  docker:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            anzel/sky:latest
            anzel/sky:${{ steps.version.outputs.VERSION }}
          platforms: linux/amd64,linux/arm64
