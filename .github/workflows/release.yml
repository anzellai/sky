name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build the compiler from committed Go source (no external dependency)
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      # Build companion tools
      - name: Build tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest &
          go build -o /usr/local/bin/skyi-filter tools/skyi_filter.go &
          go build -o /usr/local/bin/sky-ffi-gen tools/sky_ffi_gen.go &
          go build -o /usr/local/bin/sky-dce tools/sky_dce.go &
          wait

      # Phase 1: bootstrap from committed Go source
      - name: Bootstrap compiler from Go source
        run: |
          cd bootstrap
          go build -gcflags=all=-l -o ../sky-out/app .
          cd ..
          cp -f sky-out/app /usr/local/bin/sky
          sky --version

      # Phase 2: self-host (compiler compiles itself)
      - name: Self-host
        run: |
          sky build src/Main.sky
          cp -f sky-out/app /usr/local/bin/sky
          sky --version

      # Verify the built compiler works
      - name: Verify compiler
        run: |
          sky check src/Main.sky
          echo "Compiler verification passed"

      # Upload the bootstrapped Go source for cross-compilation
      - name: Upload Go source
        uses: actions/upload-artifact@v4
        with:
          name: sky-go-source
          path: |
            sky-out/main.go
            sky-out/go.mod
            sky-out/sky_parallel.go

  # Cross-compile all platforms from a single runner
  build:
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download Go source
        uses: actions/download-artifact@v4
        with:
          name: sky-go-source
          path: sky-out

      - name: Build all platforms
        run: |
          cd sky-out
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.skyVersion=${VERSION}"

          echo "Building linux/amd64..."
          GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../sky-linux-x64 .
          echo "Building linux/arm64..."
          GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ../sky-linux-arm64 .
          echo "Building darwin/amd64..."
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../sky-darwin-x64 .
          echo "Building darwin/arm64..."
          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ../sky-darwin-arm64 .
          echo "Building windows/amd64..."
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../sky-windows-x64.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: sky-binaries
          path: |
            sky-linux-x64
            sky-linux-arm64
            sky-darwin-x64
            sky-darwin-arm64
            sky-windows-x64.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sky-binaries
          path: release

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  docker:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sky-binaries
          path: release-bin

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Prepare binary for Docker
        run: |
          mkdir -p docker-bin
          cp release-bin/sky-linux-x64 docker-bin/sky
          chmod +x docker-bin/sky

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            anzel/sky:latest
            anzel/sky:${{ steps.version.outputs.VERSION }}
          build-args: |
            SKY_BINARY=docker-bin/sky
          platforms: linux/amd64
