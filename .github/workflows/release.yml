name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────
  # Cross-platform build. GHC cross-compilation is impractical, so we
  # build each target natively on its own runner.
  # ────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sky-linux-x64
            ext: ''
          - os: ubuntu-24.04-arm
            artifact: sky-linux-arm64
            ext: ''
          - os: macos-latest
            artifact: sky-darwin-arm64
            ext: ''
          - os: windows-latest
            artifact: sky-windows-x64
            ext: '.exe'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.4.8'
          cabal-version: '3.10.3.0'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            dist-newstyle
          key: ${{ runner.os }}-${{ runner.arch }}-cabal-${{ hashFiles('sky-compiler.cabal') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cabal-

      - name: Build sky compiler
        shell: bash
        run: |
          cabal update
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version:.*$/version:       ${TAG_VERSION}/" sky-compiler.cabal
          # Overwrite app/VERSION so the TH-embedded build version
          # in app/Main.hs reports `sky v${TAG_VERSION}` instead of
          # the literal `dev` that local builds use. Without this,
          # released binaries silently report "sky dev" — confirmed
          # broken on v0.9.9. See the comment block in app/Main.hs
          # around skyBuildVersion / skyVersionString.
          printf '%s' "${TAG_VERSION}" > app/VERSION
          cabal build exe:sky -O2
          SKY_BIN="$(cabal list-bin sky -O2)"
          mkdir -p dist
          cp "$SKY_BIN" "dist/${{ matrix.artifact }}${{ matrix.ext }}"
          chmod +x "dist/${{ matrix.artifact }}${{ matrix.ext }}" || true

      - name: Build sky-ffi-inspect (Go)
        shell: bash
        run: |
          ( cd tools/sky-ffi-inspect && go build -ldflags="-s -w" -o "../../dist/sky-ffi-inspect-${{ matrix.artifact }}${{ matrix.ext }}" . )

      - name: Smoke-test binary
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ACTUAL=$("./dist/${{ matrix.artifact }}${{ matrix.ext }}" --version)
          echo "$ACTUAL"
          # Fail loudly if the released binary reports "sky dev" — that
          # means app/VERSION wasn't overwritten before cabal build, and
          # the Template Haskell splice baked in the contributor literal.
          # (Confirmed broken on v0.9.9 — see the matching comment in the
          # Build step above.)
          echo "$ACTUAL" | grep -qF "sky v${TAG_VERSION}"

      - name: Package
        shell: bash
        run: |
          cd dist
          case "${{ matrix.os }}" in
            windows-*)
              7z a "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}${{ matrix.ext }}" "sky-ffi-inspect-${{ matrix.artifact }}${{ matrix.ext }}"
              ;;
            *)
              tar czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}${{ matrix.ext }}" "sky-ffi-inspect-${{ matrix.artifact }}${{ matrix.ext }}"
              ;;
          esac
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────────────────
  # Assemble release assets, generate checksums, publish GitHub Release.
  # ────────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  # ────────────────────────────────────────────────────────────────
  # Multi-arch Docker image (amd64 + arm64) built from the Dockerfile.
  # ────────────────────────────────────────────────────────────────
  docker:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            anzel/sky:latest
            anzel/sky:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
