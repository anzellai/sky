name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Build the compiler from committed Go source (no external dependency)
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      # Build companion tools
      - name: Build tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest &
          go build -o /usr/local/bin/skyi-filter tools/skyi_filter.go &
          go build -o /usr/local/bin/sky-ffi-gen tools/sky_ffi_gen.go &
          go build -o /usr/local/bin/sky-dce tools/sky_dce.go &
          wait

      # Build from committed Go source (bootstrap/main.go)
      # No self-host — the bootstrap IS the release binary source.
      # Self-hosting on CI produces different output due to platform-
      # dependent Go inspector results. The bootstrap is regenerated
      # locally and committed.
      - name: Verify bootstrap compiles
        run: |
          cd bootstrap
          go build -gcflags=all=-l -o app .
          ./app --version

      # Copy bootstrap to sky-out for artifact consistency
      - name: Prepare Go source
        run: |
          mkdir -p sky-out
          cp bootstrap/main.go bootstrap/go.mod bootstrap/sky_parallel.go bootstrap/embedded_runtime.go sky-out/
          cp -r bootstrap/runtime sky-out/

      - name: Upload Go source
        uses: actions/upload-artifact@v4
        with:
          name: sky-go-source
          path: |
            sky-out/main.go
            sky-out/go.mod
            sky-out/sky_parallel.go
            sky-out/embedded_runtime.go
            sky-out/runtime/

  # Cross-compile for each platform on its own runner
  build:
    needs: bootstrap
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: sky-linux-x64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: sky-linux-arm64
          - os: ubuntu-latest
            goos: darwin
            goarch: amd64
            artifact: sky-darwin-x64
          - os: ubuntu-latest
            goos: darwin
            goarch: arm64
            artifact: sky-darwin-arm64
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            artifact: sky-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download Go source
        uses: actions/download-artifact@v4
        with:
          name: sky-go-source
          path: sky-out

      - name: Build binary
        run: |
          cd sky-out
          VERSION="${GITHUB_REF_NAME}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -gcflags="all=-l" -ldflags="-s -w -X main.skyVersion=${VERSION}" -o ../${{ matrix.artifact }} .
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            [[ "$dir" == *"sky-go-source"* ]] && continue
            cp "$dir"* release/ 2>/dev/null || true
          done
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  docker:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sky-linux-x64
          path: release-bin

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Prepare binary for Docker
        run: |
          mkdir -p docker-bin
          cp release-bin/sky-linux-x64 docker-bin/sky
          chmod +x docker-bin/sky

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            anzel/sky:latest
            anzel/sky:${{ steps.version.outputs.VERSION }}
          build-args: |
            SKY_BINARY=docker-bin/sky
          platforms: linux/amd64
