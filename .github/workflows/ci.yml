name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts-compiler/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # Phase 0: Build bootstrap compiler from TypeScript
      - name: Bootstrap Phase 0 — TS compiler
        run: |
          cd ts-compiler
          npm ci
          npx tsx bin/sky.ts build ../src/Main.sky || true
          # Patch TS compiler output for known issues
          sed -i.bak 's/return func() any {  }()/return true/g' dist/Ffi/BindingGen/BindingGen.go dist/Ffi/WrapperGen/WrapperGen.go 2>/dev/null || true
          cd dist && go build -gcflags=all=-l -o sky-bootstrap .

      # Phase 1: Build self-hosted compiler with bootstrap
      - name: Bootstrap Phase 1 — first self-hosted build
        run: |
          cp ts-compiler/dist/sky-bootstrap bin/sky
          chmod +x bin/sky
          export PATH="$PWD/bin:$PATH"
          rm -rf sky-out
          sky build src/Main.sky

      # Phase 2: Build self-hosted compiler with itself + version injection
      - name: Bootstrap Phase 2 — self-hosting verified
        run: |
          cp sky-out/app bin/sky
          chmod +x bin/sky
          export PATH="$PWD/bin:$PATH"
          rm -rf sky-out
          sky build src/Main.sky
          # Re-build with version from git
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          cd sky-out && go build -gcflags=all=-l -ldflags="-X main.skyVersion=${VERSION}" -o app . && cd ..
          cp sky-out/app bin/sky

      # Verify compiler
      - name: Verify compiler
        run: |
          export PATH="$PWD/bin:$PATH"
          sky version
          sky check src/Main.sky

      # Test examples
      - name: Test hello-world
        run: |
          export PATH="$PWD/bin:$PATH"
          rm -rf sky-out
          sky build examples/01-hello-world/src/Main.sky
          sky-out/app | grep "Hello from Sky!"

      - name: Test json
        run: |
          export PATH="$PWD/bin:$PATH"
          rm -rf sky-out
          sky build examples/06-json/src/Main.sky
          sky-out/app | grep "Done!"

      - name: Test local-pkg
        run: |
          export PATH="$PWD/bin:$PATH"
          rm -rf sky-out
          sky build examples/04-local-pkg/src/Main.sky
          sky-out/app | grep "Calculation result"

      # Test Go FFI
      - name: Test sky add (Go stdlib)
        run: |
          export PATH="$PWD/bin:$PATH"
          sky add fmt
          test -f .skycache/go/fmt/bindings.skyi
