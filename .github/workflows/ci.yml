name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sky-linux-x64
          - os: macos-latest
            artifact: sky-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.4.8'
          cabal-version: '3.10.3.0'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('sky-compiler.cabal') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      # Single-command local/CI parity: scripts/build.sh does everything
      # the manual steps below used to — compile sky, build sky-ffi-inspect,
      # install to sky-out/ + bin/. Adds self-test + example sweep when flagged.
      - name: Build compiler + tooling
        run: |
          ./scripts/build.sh --self-tests
          echo "$PWD/sky-out" >> $GITHUB_PATH
          echo "$PWD/bin"      >> $GITHUB_PATH

      # ─────────────────────────────────────────────────────────
      # Example suite — representative subset. Keep fast so every PR runs.
      # ─────────────────────────────────────────────────────────
      - name: Test hello-world
        run: |
          cd examples/01-hello-world
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app | grep "Hello from Sky!"

      - name: Test local-pkg
        run: |
          cd examples/04-local-pkg
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app | grep "Calculation result"

      - name: Test task-demo
        run: |
          cd examples/14-task-demo
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app | grep "Hello, Sky!"

      - name: Test live-counter
        run: |
          cd examples/09-live-counter
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app &
          SERVER_PID=$!
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ | grep 200
          kill $SERVER_PID 2>/dev/null || true
          wait 2>/dev/null || true

      - name: Test http-server
        run: |
          cd examples/15-http-server
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app &
          SERVER_PID=$!
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ | grep 200
          kill $SERVER_PID 2>/dev/null || true
          wait 2>/dev/null || true

      - name: Test job-queue
        run: |
          cd examples/18-job-queue
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app &
          SERVER_PID=$!
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ | grep 200
          kill $SERVER_PID 2>/dev/null || true
          wait 2>/dev/null || true

      # ─────────────────────────────────────────────────────────
      # Tooling smoke tests
      # ─────────────────────────────────────────────────────────
      - name: Test sky fmt (idempotent)
        run: |
          cp test-files/simple-case.sky /tmp/fmt-test.sky
          sky fmt /tmp/fmt-test.sky
          cp /tmp/fmt-test.sky /tmp/fmt-test2.sky
          sky fmt /tmp/fmt-test2.sky
          diff /tmp/fmt-test.sky /tmp/fmt-test2.sky

      - name: Test sky check
        run: sky check test-files/simple-case.sky

      # ─────────────────────────────────────────────────────────
      # Artifact
      # ─────────────────────────────────────────────────────────
      - name: Package artifact
        run: |
          mkdir -p dist
          cp sky-out/sky dist/${{ matrix.artifact }}
          tar czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz
