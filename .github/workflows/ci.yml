name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sky-linux-x64
          - os: macos-latest
            artifact: sky-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      # Build tools (needed for compilation pipeline)
      - name: Build tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest &
          go build -o /usr/local/bin/skyi-filter tools/skyi_filter.go &
          go build -o /usr/local/bin/sky-dce tools/sky_dce.go &
          go build -o /usr/local/bin/sky-ffi-gen tools/sky_ffi_gen.go &
          wait

      # Bootstrap: build compiler from committed Go source (bootstrap/main.go)
      - name: Bootstrap compiler from Go source
        run: |
          cd bootstrap
          go build -gcflags=all=-l -o app .
          cd ..
          cp -f bootstrap/app /usr/local/bin/sky
          sky --version

      # Phase 1: compile from Sky source
      - name: Phase 1 compile
        run: |
          rm -rf .skycache sky-out
          sky build src/Main.sky
          cp -f sky-out/app /usr/local/bin/sky
          sky --version

      # Phase 2: self-host (new compiler compiles itself)
      - name: Phase 2 self-host
        run: |
          rm -rf .skycache sky-out
          sky build src/Main.sky
          cp -f sky-out/app /usr/local/bin/sky
          sky --version

      # Verify the built compiler works
      - name: Verify compiler
        run: |
          sky check src/Main.sky
          echo "Compiler verification passed"

      # Verify type safety features in generated code
      - name: Verify type safety
        run: |
          grep -q 'panic("non-exhaustive case expression")' sky-out/main.go && echo "Non-exhaustive panic: OK"

      # Test examples — each builds in its own directory so sky-out/
      # at repo root (the compiler) is never overwritten.
      - name: Test hello-world
        run: |
          cd examples/01-hello-world
          sky build src/Main.sky
          sky-out/app | grep "Hello from Sky!"

      - name: Test json
        run: |
          cd examples/06-json
          sky build src/Main.sky
          sky-out/app | grep "Done!"

      - name: Test local-pkg
        run: |
          cd examples/04-local-pkg
          sky build src/Main.sky
          sky-out/app | grep "Calculation result"

      - name: Test task-demo
        run: |
          cd examples/14-task-demo
          sky build src/Main.sky
          sky-out/app | grep "Hello, Sky!"

      # Test examples — with Go FFI
      - name: Test go-stdlib (FFI)
        run: |
          cd examples/02-go-stdlib
          sky install
          sky build src/Main.sky
          sky-out/app | grep "SHA256"

      - name: Test live-component
        run: |
          cd examples/10-live-component
          sky build src/Main.sky

      # Test Go FFI toolchain
      - name: Test sky add (Go stdlib)
        run: |
          sky add fmt
          test -f .skycache/go/fmt/bindings.skyi
