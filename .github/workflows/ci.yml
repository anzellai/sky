name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sky-linux-x64
          - os: macos-latest
            artifact: sky-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Download the latest released Sky binary
      - name: Install Sky compiler
        run: |
          curl -fsSL "https://github.com/anzellai/sky/releases/latest/download/${{ matrix.artifact }}" -o sky
          chmod +x sky
          sudo mv sky /usr/local/bin/sky
          sky version

      # Build the skyi-filter tool (needed for large .skyi filtering)
      - name: Build skyi-filter
        run: |
          go build -o /usr/local/bin/skyi-filter tools/skyi_filter.go

      # Build the compiler from source (self-hosting test)
      - name: Build compiler from source
        run: |
          sky build src/Main.sky
          sky-out/app version

      # Verify self-hosting (compiler compiles itself)
      - name: Verify self-hosting
        run: |
          cp sky-out/app /usr/local/bin/sky
          rm -rf sky-out
          sky build src/Main.sky
          sky-out/app version

      # Type check
      - name: Type check
        run: sky check src/Main.sky

      # Test examples — simple (no FFI)
      - name: Test hello-world
        run: |
          rm -rf sky-out
          sky build examples/01-hello-world/src/Main.sky
          sky-out/app | grep "Hello from Sky!"

      - name: Test json
        run: |
          rm -rf sky-out
          sky build examples/06-json/src/Main.sky
          sky-out/app | grep "Done!"

      - name: Test local-pkg
        run: |
          rm -rf sky-out
          sky build examples/04-local-pkg/src/Main.sky
          sky-out/app | grep "Calculation result"

      - name: Test task-demo
        run: |
          rm -rf sky-out
          sky build examples/14-task-demo/src/Main.sky
          sky-out/app | grep "Hello, Sky!"

      # Test examples — with Go FFI
      - name: Test go-stdlib
        run: |
          rm -rf sky-out
          sky build examples/02-go-stdlib/src/Main.sky
          sky-out/app | grep "SHA256"

      - name: Test live-component
        run: |
          rm -rf sky-out
          sky build examples/10-live-component/src/Main.sky

      # Test Go FFI toolchain
      - name: Test sky add (Go stdlib)
        run: |
          sky add fmt
          test -f .skycache/go/fmt/bindings.skyi
