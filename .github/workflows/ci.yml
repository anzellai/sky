name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sky-linux-x64
          - os: macos-latest
            artifact: sky-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────
      # Toolchain: GHC (Haskell compiler for sky) + Go (runtime + tools)
      # ─────────────────────────────────────────────────────────
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.4.8'
          cabal-version: '3.10.3.0'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('sky-compiler.cabal') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      # ─────────────────────────────────────────────────────────
      # Build the Sky compiler (Haskell)
      # ─────────────────────────────────────────────────────────
      - name: Build sky compiler
        run: |
          cabal update
          cabal build
          SKY_BIN=$(cabal list-bin sky)
          mkdir -p /tmp/skybin
          cp -f "$SKY_BIN" /tmp/skybin/sky
          chmod +x /tmp/skybin/sky
          echo "/tmp/skybin" >> $GITHUB_PATH
          /tmp/skybin/sky --version

      # ─────────────────────────────────────────────────────────
      # Build supporting Go tools (FFI inspector)
      # ─────────────────────────────────────────────────────────
      - name: Build sky-ffi-inspect
        run: |
          mkdir -p bin
          (cd tools/sky-ffi-inspect && go build -o ../../bin/sky-ffi-inspect .)
          test -x bin/sky-ffi-inspect

      # ─────────────────────────────────────────────────────────
      # Self-test suite
      # ─────────────────────────────────────────────────────────
      - name: Run self-tests
        run: |
          pass=0; fail=0
          for f in test-files/*.sky; do
            rm -rf .skycache
            if sky build "$f" 2>&1 | tail -1 | grep -q 'Build complete'; then
              pass=$((pass+1))
            else
              fail=$((fail+1))
              echo "  FAIL $f"
            fi
          done
          echo "self-tests: $pass passed, $fail failed"
          test "$fail" = "0"

      # ─────────────────────────────────────────────────────────
      # Example suite (passing subset — expanded as gaps close)
      # ─────────────────────────────────────────────────────────
      - name: Test hello-world
        run: |
          cd examples/01-hello-world
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app | grep "Hello from Sky!"

      - name: Test local-pkg
        run: |
          cd examples/04-local-pkg
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app | grep "Calculation result"

      - name: Test live-counter
        run: |
          cd examples/09-live-counter
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app &
          SERVER_PID=$!
          sleep 2
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ | grep 200
          kill $SERVER_PID 2>/dev/null || true
          wait 2>/dev/null || true

      - name: Test task-demo
        run: |
          cd examples/14-task-demo
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app | grep "Hello, Sky!"

      - name: Test http-server
        run: |
          cd examples/15-http-server
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app &
          SERVER_PID=$!
          sleep 2
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ | grep 200
          kill $SERVER_PID 2>/dev/null || true
          wait 2>/dev/null || true

      - name: Test job-queue
        run: |
          cd examples/18-job-queue
          rm -rf sky-out .skycache
          sky build src/Main.sky
          ./sky-out/app &
          SERVER_PID=$!
          sleep 2
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ | grep 200
          kill $SERVER_PID 2>/dev/null || true
          wait 2>/dev/null || true

      # ─────────────────────────────────────────────────────────
      # Smoke tests: tooling
      # ─────────────────────────────────────────────────────────
      - name: Test sky fmt
        run: |
          cp test-files/simple-case.sky /tmp/fmt-test.sky
          sky fmt /tmp/fmt-test.sky
          test -f /tmp/fmt-test.sky
          # re-fmt idempotent
          cp /tmp/fmt-test.sky /tmp/fmt-test2.sky
          sky fmt /tmp/fmt-test2.sky
          diff /tmp/fmt-test.sky /tmp/fmt-test2.sky

      - name: Test sky check
        run: sky check test-files/simple-case.sky

      - name: Package artifact
        run: |
          mkdir -p dist
          cp /tmp/skybin/sky dist/${{ matrix.artifact }}
          tar czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz
