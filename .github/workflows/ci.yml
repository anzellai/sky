name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sky-linux-x64
          - os: macos-latest
            artifact: sky-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Install goimports (needed by DCE to clean unused imports)
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      # Build tools (needed for compilation pipeline)
      - name: Build tools
        run: |
          go build -o /usr/local/bin/skyi-filter tools/skyi_filter.go
          go build -o /usr/local/bin/trim-imports tools/trim_imports.go
          go build -o /usr/local/bin/sky-dce tools/sky_dce.go

      # Bootstrap: build compiler from committed Go source (sky-out/main.go)
      - name: Bootstrap compiler from Go source
        run: |
          cd sky-out
          go build -gcflags=all=-l -o app .
          cd ..
          cp -f sky-out/app /usr/local/bin/sky
          sky build src/Main.sky
          sky-out/app version

      # Phase 2: self-host (new compiler compiles itself)
      - name: Phase 2 self-host
        run: |
          cp -f sky-out/app /usr/local/bin/sky
          rm -rf sky-out
          sky build src/Main.sky
          sky-out/app version

      # Phase 3: propagate lowerer fixes
      - name: Phase 3 bootstrap
        run: |
          cp -f sky-out/app /usr/local/bin/sky
          rm -rf sky-out
          sky build src/Main.sky
          sky-out/app version

      # Verify the built compiler works (not a hello-world binary)
      - name: Verify compiler
        run: |
          sky-out/app check src/Main.sky
          echo "Compiler verification passed"

      # Type check
      - name: Type check
        run: sky check src/Main.sky

      # Test examples — simple (no FFI)
      - name: Test hello-world
        run: |
          rm -rf sky-out
          sky build examples/01-hello-world/src/Main.sky
          sky-out/app | grep "Hello from Sky!"

      - name: Test json
        run: |
          rm -rf sky-out
          sky build examples/06-json/src/Main.sky
          sky-out/app | grep "Done!"

      - name: Test local-pkg
        run: |
          rm -rf sky-out
          sky build examples/04-local-pkg/src/Main.sky
          sky-out/app | grep "Calculation result"

      - name: Test task-demo
        run: |
          rm -rf sky-out
          sky build examples/14-task-demo/src/Main.sky
          sky-out/app | grep "Hello, Sky!"

      # Test examples — with Go FFI (requires .skycache bindings)
      # These test sky add + build together
      - name: Test go-stdlib (FFI)
        run: |
          rm -rf sky-out .skycache
          sky add crypto/sha256
          sky add encoding/hex
          sky add net/http
          sky add time
          sky build examples/02-go-stdlib/src/Main.sky
          sky-out/app | grep "SHA256"

      - name: Test live-component
        run: |
          rm -rf sky-out
          sky build examples/10-live-component/src/Main.sky

      # Test Go FFI toolchain
      - name: Test sky add (Go stdlib)
        run: |
          sky add fmt
          test -f .skycache/go/fmt/bindings.skyi
