name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sky-linux-x64
          - os: macos-latest
            artifact: sky-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Install goimports (needed by DCE to clean unused imports)
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      # Download the latest released Sky binary
      - name: Install Sky compiler
        run: |
          curl -fsSL "https://github.com/anzellai/sky/releases/latest/download/${{ matrix.artifact }}" -o sky
          chmod +x sky
          sudo mv sky /usr/local/bin/sky
          sky version

      # Build tools (needed for compilation pipeline)
      - name: Build tools
        run: |
          go build -o /usr/local/bin/skyi-filter tools/skyi_filter.go
          go build -o /usr/local/bin/trim-imports tools/trim_imports.go

      # Build the compiler from source (two-phase bootstrap for new stdlib functions)
      - name: Build compiler from source
        run: |
          sky build src/Main.sky || {
            echo "Phase 1 bootstrap: patching undefined Go refs..."
            cd sky-out
            sed 's/io\.readAllStdin/sky_readAllStdin/g' main.go > main.go.tmp && mv main.go.tmp main.go
            echo 'func sky_readAllStdin(u any) any { b, err := io.ReadAll(os.Stdin); if err != nil { return SkyErr(err.Error()) }; return SkyOk(string(b)) }' >> main.go
            go build -gcflags=all=-l -o app .
            cd ..
          }
          sky-out/app version

      # Verify self-hosting (Phase 2 — new compiler compiles itself)
      - name: Verify self-hosting
        run: |
          cp sky-out/app /usr/local/bin/sky
          rm -rf sky-out
          sky build src/Main.sky
          sky-out/app version

      # Phase 3 bootstrap — ensures lowerer fixes (e.g. cons pattern) take effect
      - name: Phase 3 bootstrap
        run: |
          cp sky-out/app /usr/local/bin/sky
          rm -rf sky-out
          sky build src/Main.sky
          sky-out/app version

      # Type check
      - name: Type check
        run: sky check src/Main.sky

      # Test examples — simple (no FFI)
      - name: Test hello-world
        run: |
          rm -rf sky-out
          sky build examples/01-hello-world/src/Main.sky
          sky-out/app | grep "Hello from Sky!"

      - name: Test json
        run: |
          rm -rf sky-out
          sky build examples/06-json/src/Main.sky
          sky-out/app | grep "Done!"

      - name: Test local-pkg
        run: |
          rm -rf sky-out
          sky build examples/04-local-pkg/src/Main.sky
          sky-out/app | grep "Calculation result"

      - name: Test task-demo
        run: |
          rm -rf sky-out
          sky build examples/14-task-demo/src/Main.sky
          sky-out/app | grep "Hello, Sky!"

      # Test examples — with Go FFI (requires .skycache bindings)
      # These test sky add + build together
      - name: Test go-stdlib (FFI)
        run: |
          rm -rf sky-out .skycache
          sky add crypto/sha256
          sky add encoding/hex
          sky add net/http
          sky add time
          sky build examples/02-go-stdlib/src/Main.sky
          sky-out/app | grep "SHA256"

      - name: Test live-component
        run: |
          rm -rf sky-out
          sky build examples/10-live-component/src/Main.sky

      # Test Go FFI toolchain
      - name: Test sky add (Go stdlib)
        run: |
          sky add fmt
          test -f .skycache/go/fmt/bindings.skyi
